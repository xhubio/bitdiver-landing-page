<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E61919"/>
    </marker>
    <style>
      text { font-family: monospace; fill: #EAEAEA; text-anchor: middle; }
      .tick { font-size: 8px; }
      .frame { font-size: 9px; font-weight: bold; }
    </style>
  </defs>

  <!-- Background panel (makes the diagram legible on both themes) -->
  <rect x="0" y="0" width="160" height="120" fill="#0A0A0A"/>

  <!-- Left: one testcase (single row) -->
  <rect x="8" y="54" width="24" height="12" fill="#1A1A1A" stroke="#EAEAEA" stroke-width="1"/>
  <text x="20" y="78" class="tick">1 TC</text>

  <!-- Right: stack of N testcases -->
  <rect x="108" y="26" width="40" height="10" fill="#1A1A1A" stroke="#EAEAEA" stroke-width="1"/>
  <rect x="108" y="40" width="40" height="10" fill="#1A1A1A" stroke="#EAEAEA" stroke-width="1"/>
  <rect x="108" y="54" width="40" height="10" fill="#1A1A1A" stroke="#EAEAEA" stroke-width="1"/>
  <rect x="108" y="68" width="40" height="10" fill="#1A1A1A" stroke="#EAEAEA" stroke-width="1"/>
  <rect x="108" y="82" width="40" height="10" fill="#1A1A1A" stroke="#EAEAEA" stroke-width="1"/>
  <text x="128" y="106" class="tick">N TCs</text>

  <!-- Arrow fan: 1 → N -->
  <line x1="36" y1="60" x2="104" y2="31" stroke="#E61919" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="36" y1="60" x2="104" y2="45" stroke="#E61919" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="36" y1="60" x2="104" y2="59" stroke="#E61919" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="36" y1="60" x2="104" y2="73" stroke="#E61919" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="36" y1="60" x2="104" y2="87" stroke="#E61919" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Framed wall-clock label -->
  <rect x="48" y="6" width="64" height="16" fill="none" stroke="#E61919" stroke-width="1"/>
  <text x="80" y="18" class="frame">30 MIN</text>
</svg>
