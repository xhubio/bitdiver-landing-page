<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 620">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E61919"/>
    </marker>
    <style>
      text { font-family: monospace; fill: #EAEAEA; text-anchor: middle; }
      .title { font-size: 13px; font-weight: bold; }
      .subtitle { font-size: 10px; opacity: 0.7; }
      .inner-title { font-size: 11px; font-weight: bold; }
      .inner-sub { font-size: 9px; opacity: 0.7; }
    </style>
  </defs>

  <!-- 1. SUITE CONFIG -->
  <rect x="100" y="10" width="300" height="50" fill="#1A1A1A" stroke="#E61919" stroke-width="2"/>
  <text x="250" y="32" class="title">SUITE CONFIG</text>
  <text x="250" y="48" class="subtitle">YAML / JSON</text>

  <!-- Arrow 1→2 -->
  <line x1="250" y1="60" x2="250" y2="82" stroke="#E61919" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2. SUITE BUILDER -->
  <rect x="100" y="85" width="300" height="50" fill="#1A1A1A" stroke="#EAEAEA" stroke-width="1"/>
  <text x="250" y="107" class="title">SUITE BUILDER</text>
  <text x="250" y="123" class="subtitle">scan &#x2192; build &#x2192; validate</text>

  <!-- Arrow 2→3 -->
  <line x1="250" y1="135" x2="250" y2="157" stroke="#E61919" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3. SUITE DEFINITION -->
  <rect x="100" y="160" width="300" height="50" fill="#1A1A1A" stroke="#EAEAEA" stroke-width="1"/>
  <text x="250" y="182" class="title">SUITE DEFINITION</text>
  <text x="250" y="198" class="subtitle">steps + sparse data</text>

  <!-- Arrow 3→4 -->
  <line x1="250" y1="210" x2="250" y2="232" stroke="#E61919" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4. RUNNER (large box) -->
  <rect x="50" y="235" width="400" height="180" fill="#1A1A1A" stroke="#E61919" stroke-width="2"/>
  <text x="250" y="258" class="title">RUNNER</text>

  <!-- Inner left: REGISTRY -->
  <rect x="70" y="268" width="170" height="40" fill="none" stroke="#EAEAEA" stroke-width="1"/>
  <text x="155" y="293" class="inner-title">REGISTRY</text>

  <!-- Inner right: PROGRESS -->
  <rect x="260" y="268" width="170" height="40" fill="none" stroke="#EAEAEA" stroke-width="1"/>
  <text x="345" y="293" class="inner-title">PROGRESS</text>

  <!-- Inner bottom: PARALLEL EXECUTION -->
  <rect x="70" y="322" width="360" height="50" fill="none" stroke="#EAEAEA" stroke-width="1"/>
  <text x="250" y="344" class="inner-title">PARALLEL EXECUTION</text>
  <text x="250" y="362" class="inner-sub">Normal | Single | Timed</text>

  <!-- Arrow 4→5 -->
  <line x1="250" y1="415" x2="250" y2="437" stroke="#E61919" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 5. CHECK / RESULTS -->
  <rect x="100" y="440" width="300" height="50" fill="#1A1A1A" stroke="#EAEAEA" stroke-width="1"/>
  <text x="250" y="462" class="title">CHECK / RESULTS</text>
  <text x="250" y="478" class="subtitle">compare + summary</text>

  <!-- Arrow 5→6 -->
  <line x1="250" y1="490" x2="250" y2="512" stroke="#E61919" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 6. LOG ADAPTER -->
  <rect x="100" y="515" width="300" height="50" fill="#1A1A1A" stroke="#EAEAEA" stroke-width="1"/>
  <text x="250" y="537" class="title">LOG ADAPTER</text>
  <text x="250" y="553" class="subtitle">console | file | memory</text>
</svg>